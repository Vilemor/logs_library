name: Feature Branch Quality Gate

on:
  push:
    branches:
      - 'feature/*'

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest

      - name: Lint with flake8 (PEP8)
        run: |
          flake8 .
        continue-on-error: false

      - name: Check for unit tests
        id: check_tests
        run: |
          if [ -d "tests" ] && ls tests/test_*.py 1> /dev/null 2>&1; then
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Fail if no unit tests found
        if: steps.check_tests.outputs.found == 'false'
        run: |
          echo "::error::No unit tests found in the 'tests' folder. Please add tests before merging."
          exit 1

      - name: Run unit tests (pytest)
        if: steps.check_tests.outputs.found == 'true'
        run: |
          pytest --maxfail=1 --disable-warnings -q

      - name: Create Pull Request to develop
        if: success()
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: develop
          title: "Automated PR from ${{ github.ref_name }}"
          body: |
            ## :rocket: Workflow Summary

            **Branch:** `${{ github.ref_name }}`
            **Triggered by:** `${{ github.actor }}`

            ### Checks performed:
            - [x] Lint (flake8): Passed
            - [x] Unit tests present and executed (pytest): Passed

            ---
            _This PR was automatically created by GitHub Actions after passing all quality gates._