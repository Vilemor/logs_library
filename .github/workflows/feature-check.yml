name: Feature Branch Quality Gates

on:
  push:
    branches:
      - 'feature/*'

jobs:
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          python -m pip install --upgrade pip
          pip install flake8
      - name: Run flake8
        run: flake8 .

  check-tests-exist:
    name: Check for Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    outputs:
      found: ${{ steps.check.outputs.found }}
    steps:
      - uses: actions/checkout@v4
      - name: Check for unit tests
        id: check
        run: |
          if [ -d "tests" ] && ls tests/test_*.py 1> /dev/null 2>&1; then
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

  unit-tests:
    name: Run Unit Tests (pytest)
    runs-on: ubuntu-latest
    needs: check-tests-exist
    if: needs.check-tests-exist.outputs.found == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          python -m pip install --upgrade pip
          pip install pytest
      - name: Run pytest
        run: pytest --maxfail=1 --disable-warnings -q

  fail-no-tests:
    name: Fail if No Unit Tests Found
    runs-on: ubuntu-latest
    needs: check-tests-exist
    if: needs.check-tests-exist.outputs.found == 'false'
    steps:
      - run: |
          echo "::error::No unit tests found in the 'tests' folder. Please add tests before merging."
          exit 1

  create-pr:
    name: Create Pull Request to develop
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    if: ${{ always() && needs.lint.result == 'success' && needs.unit-tests.result == 'success' }}
    steps:
      - uses: actions/checkout@v4
      - uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: develop
          title: "Automated PR from ${{ github.ref_name }}"
          body: |
            ## :rocket: Workflow Summary

            **Branch:** `${{ github.ref_name }}`
            **Triggered by:** `${{ github.actor }}`

            ### Checks performed:
            - [x] Lint (flake8): Passed
            - [x] Unit tests present and executed (pytest): Passed

            ---
            _This PR was automatically created by GitHub Actions after passing all quality gates._