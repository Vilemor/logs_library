name: Feature Branch Quality Gates

on:
  push:
    branches:
      - 'feature/*'

jobs:
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install flake8
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Run flake8 (PEP8)
        run: flake8 .
        continue-on-error: false

  check-tests-exist:
    name: Check for Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    outputs:
      found: ${{ steps.check.outputs.found }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for unit tests
        id: check
        run: |
          if [ -d "tests" ] && ls tests/test_*.py 1> /dev/null 2>&1; then
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

  unit-tests:
    name: Run Unit Tests (pytest)
    runs-on: ubuntu-latest
    needs: check-tests-exist
    if: needs.check-tests-exist.outputs.found == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cases
      - name: Run pytest
        run: |
          PYTHONPATH=$(pwd) pytest --maxfail=1 --disable-warnings -q

  fail-no-tests:
    name: Fail if No Unit Tests Found
    runs-on: ubuntu-latest
    needs: check-tests-exist
    if: needs.check-tests-exist.outputs.found == 'false'
    steps:
      - run: |
          echo "::error::No unit tests found in the 'tests' folder. Please add tests before merging."
          exit 1

  create-pr:
    name: Create Pull Request to develop
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    if: ${{ needs.lint.result == 'success' && needs.unit-tests.result == 'success' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Pull Request to develop
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GH_PAT }}
          base: develop
          branch: ${{ github.ref_name }}
          title: "Automated PR from ${{ github.ref_name }}"
          body: |
            ## :rocket: Workflow Summary

            **Branch:** `${{ github.ref_name }}`
            **Triggered by:** `${{ github.actor }}`
            **Commit:** `${{ github.sha }}`

            ### Quality Gates Executed

            | Gate                | Status     |
            |---------------------|------------|
            | Lint (flake8)       | ✅ Passed  |
            | Unit tests (pytest) | ✅ Passed  |

            ---
            _This PR was automatically created by GitHub Actions after passing all quality gates._